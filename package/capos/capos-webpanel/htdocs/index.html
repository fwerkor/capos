<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CapOS WebDesktop</title>
    <style>
      :root {
        --bg: #efe8dc;
        --surface: rgba(255, 249, 239, 0.92);
        --surface-strong: #fffdf8;
        --ink: #162028;
        --muted: #687782;
        --line: #d8cfbe;
        --accent: #cf5b34;
        --accent-strong: #b64320;
        --accent-soft: #ffe2d4;
        --success: #1f7a54;
        --danger: #b53b33;
        --shadow: 0 24px 60px rgba(37, 44, 51, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Segoe UI", "PingFang SC", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 246, 221, 0.85), transparent 35%),
          radial-gradient(circle at right, rgba(220, 128, 85, 0.12), transparent 28%),
          linear-gradient(180deg, #f5efe4 0%, #ebe2d2 100%);
      }

      body {
        padding: 20px;
      }

      .app {
        display: none;
        grid-template-rows: auto 1fr;
        gap: 18px;
        min-height: calc(100vh - 40px);
      }

      .app.ready {
        display: grid;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 22px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255, 251, 244, 0.9);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .brand-mark {
        width: 52px;
        height: 52px;
        border-radius: 18px;
        background: linear-gradient(135deg, #da6a42, #f1b17a);
        display: grid;
        place-items: center;
        color: white;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .brand h1,
      .brand p {
        margin: 0;
      }

      .brand h1 {
        font-size: 22px;
      }

      .brand p {
        color: var(--muted);
        font-size: 13px;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .pill,
      button,
      .link-button {
        border: none;
        border-radius: 999px;
        padding: 11px 16px;
        font: inherit;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      }

      .pill:hover,
      button:hover,
      .link-button:hover {
        transform: translateY(-1px);
      }

      .pill {
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-weight: 700;
      }

      .link-button,
      .primary {
        background: var(--accent);
        color: white;
        text-decoration: none;
        box-shadow: 0 12px 24px rgba(207, 91, 52, 0.24);
      }

      .secondary {
        background: #fff;
        color: var(--ink);
        border: 1px solid var(--line);
      }

      .danger {
        background: rgba(181, 59, 51, 0.12);
        color: var(--danger);
      }

      .shell {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 18px;
        min-height: 0;
      }

      .sidebar,
      .desktop {
        min-height: 0;
      }

      .stack {
        display: grid;
        gap: 18px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--surface);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .panel-head {
        padding: 18px 22px 10px;
      }

      .panel-head h2,
      .panel-head p {
        margin: 0;
      }

      .panel-head h2 {
        font-size: 18px;
      }

      .panel-head p {
        color: var(--muted);
        margin-top: 6px;
        font-size: 13px;
      }

      .panel-body {
        padding: 0 22px 22px;
      }

      .apps {
        display: grid;
        gap: 12px;
      }

      .app-card {
        background: var(--surface-strong);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      .app-card h3,
      .app-card p {
        margin: 0;
      }

      .app-card p {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .app-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 6px 10px;
        background: #fff;
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .chip.running {
        color: var(--success);
        background: rgba(31, 122, 84, 0.1);
        border-color: rgba(31, 122, 84, 0.2);
      }

      .chip.stopped {
        color: var(--danger);
        background: rgba(181, 59, 51, 0.1);
        border-color: rgba(181, 59, 51, 0.2);
      }

      .chip.portmap {
        cursor: pointer;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .actions button {
        padding: 9px 13px;
        font-size: 13px;
      }

      .desktop-frame {
        width: 100%;
        height: 100%;
        min-height: 720px;
        border: none;
        display: block;
        background: #f7f6f1;
      }

      .desktop-shell {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 0;
        height: 100%;
      }

      .desktop-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 18px 22px;
        border-bottom: 1px solid var(--line);
      }

      .desktop-toolbar h2,
      .desktop-toolbar p {
        margin: 0;
      }

      .desktop-toolbar p {
        color: var(--muted);
        font-size: 13px;
        margin-top: 5px;
      }

      .upload-box {
        display: grid;
        gap: 12px;
      }

      input[type="text"],
      input[type="password"],
      input[type="file"] {
        width: 100%;
        padding: 13px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        font: inherit;
      }

      .status {
        position: fixed;
        right: 20px;
        bottom: 20px;
        max-width: 360px;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(22, 32, 40, 0.92);
        color: white;
        box-shadow: var(--shadow);
        opacity: 0;
        transform: translateY(10px);
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .status.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .inspection {
        background: #171d22;
        color: #d7e1e8;
        border-radius: 16px;
        padding: 14px;
        overflow: auto;
        font: 12px/1.5 ui-monospace, monospace;
      }

      .login {
        display: grid;
        place-items: center;
        min-height: calc(100vh - 40px);
      }

      .login-card {
        width: min(420px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 28px;
        background: rgba(255, 250, 240, 0.92);
        box-shadow: var(--shadow);
        padding: 28px;
        display: grid;
        gap: 16px;
      }

      .login-card h1,
      .login-card p {
        margin: 0;
      }

      .login-card p {
        color: var(--muted);
      }

      @media (max-width: 1080px) {
        .shell {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <section class="login" id="loginView">
      <form class="login-card" id="loginForm">
        <div>
          <h1>CapOS WebDesktop</h1>
          <p>使用系统 Linux 用户登录，进入你自己的应用桌面。</p>
        </div>
        <input id="username" type="text" autocomplete="username" placeholder="用户名" required />
        <input id="password" type="password" autocomplete="current-password" placeholder="密码" required />
        <button class="primary" type="submit">登录</button>
      </form>
    </section>

    <section class="app" id="appShell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">CAP</div>
          <div>
            <h1>CapOS WebDesktop</h1>
            <p id="sessionSummary">正在同步你的应用环境…</p>
          </div>
        </div>
        <div class="topbar-actions">
          <span class="pill" id="userBadge">访客</span>
          <a class="link-button" href="/cgi-bin/luci/" id="luciLink" style="display:none">LuCI</a>
          <button class="secondary" id="refreshBtn" type="button">刷新</button>
          <button class="danger" id="logoutBtn" type="button">退出</button>
        </div>
      </header>

      <div class="shell">
        <aside class="sidebar stack">
          <section class="panel">
            <div class="panel-head">
              <h2>应用库</h2>
              <p>这里只显示当前登录用户自己的应用。</p>
            </div>
            <div class="panel-body">
              <div class="apps" id="appsList"></div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h2>上传安装 CPK</h2>
              <p>系统面板只负责本地上传安装，不内建应用商店。</p>
            </div>
            <div class="panel-body">
              <div class="upload-box">
                <input id="cpkFile" type="file" accept=".cpk,.tar.gz,.tgz" />
                <button class="primary" id="uploadBtn" type="button">上传并预检</button>
                <button class="secondary" id="installBtn" type="button" disabled>确认安装</button>
                <div class="inspection" id="inspectionBox">等待上传 CPK…</div>
              </div>
            </div>
          </section>
        </aside>

        <main class="desktop">
          <section class="panel desktop-shell">
            <div class="desktop-toolbar">
              <div>
                <h2>桌面应用</h2>
                <p id="desktopHint">选择一个已安装应用作为你的桌面应用。</p>
              </div>
              <button class="secondary" id="reloadDesktopBtn" type="button">重载桌面</button>
            </div>
            <iframe class="desktop-frame" id="desktopFrame" src="/cgi-bin/cap/app"></iframe>
          </section>
        </main>
      </div>
    </section>

    <div class="status" id="statusToast"></div>

    <script>
      const state = {
        session: null,
        apps: [],
        desktop: null,
        upload: null,
      };

      const $ = (id) => document.getElementById(id);

      const loginView = $("loginView");
      const appShell = $("appShell");
      const appsList = $("appsList");
      const sessionSummary = $("sessionSummary");
      const userBadge = $("userBadge");
      const luciLink = $("luciLink");
      const inspectionBox = $("inspectionBox");
      const desktopHint = $("desktopHint");
      const desktopFrame = $("desktopFrame");
      const statusToast = $("statusToast");

      function showStatus(message, kind = "info") {
        statusToast.textContent = message;
        statusToast.style.background = kind === "error" ? "rgba(181,59,51,.95)" : "rgba(22,32,40,.92)";
        statusToast.classList.add("visible");
        clearTimeout(showStatus.timer);
        showStatus.timer = setTimeout(() => statusToast.classList.remove("visible"), 2800);
      }

      async function api(path, options = {}) {
        const res = await fetch(`/cgi-bin/cap/api${path}`, {
          credentials: "same-origin",
          ...options,
        });
        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch (error) {
          throw new Error(text || `HTTP ${res.status}`);
        }
        if (!res.ok || data.ok === false) {
          throw new Error(data.message || `HTTP ${res.status}`);
        }
        return data;
      }

      function setAuthedUi(authed) {
        loginView.style.display = authed ? "none" : "grid";
        appShell.classList.toggle("ready", authed);
      }

      function refreshDesktopFrame() {
        desktopFrame.src = `/cgi-bin/cap/app?ts=${Date.now()}`;
      }

      function renderApps() {
        if (!state.apps.length) {
          appsList.innerHTML = `<div class="app-card"><h3>还没有已安装应用</h3><p>上传一个 CPK 并通过预检后，就可以在这里看到它。</p></div>`;
          return;
        }

        appsList.innerHTML = state.apps
          .map((item) => {
            const nickname = item.app.nickname || item.app.name;
            const running = item.runtime.running;
            const desktop = state.desktop && state.desktop.app === item.app.name;
            const risks = [];
            if (item.permissions.host_network) risks.push("Host Network");
            if (item.permissions.host_exec) risks.push("Host Exec");
            const portmaps = (item.portmaps || [])
              .map(
                (map) =>
                  `<button class="chip portmap" type="button" data-action="remove-port" data-app="${item.app.name}" data-listen="${map.listen}" data-target="${map.target_port}" data-proto="${map.proto}">${map.proto} ${map.listen}→${map.target_port}</button>`
              )
              .join("");
            return `
              <article class="app-card">
                <div>
                  <h3>${nickname}</h3>
                  <p>${item.app.description || "这个应用还没有提供描述。"}</p>
                </div>
                <div class="app-meta">
                  <span class="chip ${running ? "running" : "stopped"}">${running ? "Running" : "Stopped"}</span>
                  <span class="chip">Version ${item.app.version || "-"}</span>
                  ${desktop ? '<span class="chip">Desktop</span>' : ""}
                  ${risks.map((risk) => `<span class="chip">${risk}</span>`).join("")}
                  ${portmaps}
                </div>
                <div class="actions">
                  <button class="secondary" data-action="start" data-app="${item.app.name}">启动</button>
                  <button class="secondary" data-action="stop" data-app="${item.app.name}">停止</button>
                  <button class="secondary" data-action="restart" data-app="${item.app.name}">重启</button>
                  <button class="secondary" data-action="portmap" data-app="${item.app.name}">映射端口</button>
                  <button class="secondary" data-action="desktop" data-app="${item.app.name}">设为桌面</button>
                  <button class="danger" data-action="uninstall" data-app="${item.app.name}">卸载</button>
                </div>
              </article>
            `;
          })
          .join("");
      }

      async function loadSession() {
        const data = await api("/session");
        if (!data.authenticated) {
          state.session = null;
          setAuthedUi(false);
          return false;
        }

        state.session = data.session;
        userBadge.textContent = `${data.session.username}${data.session.is_sudo ? " · sudo" : ""}`;
        sessionSummary.textContent = `当前用户：${data.session.username} · ${
          data.session.is_sudo ? "具备 sudo 权限" : "普通用户权限"
        }`;
        luciLink.style.display = data.session.is_sudo ? "inline-flex" : "none";
        setAuthedUi(true);
        return true;
      }

      async function loadApps() {
        const data = await api("/apps");
        state.apps = data.apps || [];
        renderApps();
      }

      async function loadDesktop() {
        const data = await api("/desktop");
        state.desktop = data;
        desktopHint.textContent = data.app
          ? `当前桌面应用：${data.app}`
          : "选择一个已安装应用作为你的桌面应用。";
        refreshDesktopFrame();
      }

      async function refreshAll() {
        if (!(await loadSession())) {
          return;
        }
        await Promise.all([loadApps(), loadDesktop()]);
      }

      $("loginForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          await api("/login", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: new URLSearchParams({
              username: $("username").value,
              password: $("password").value,
            }),
          });
          $("password").value = "";
          showStatus("登录成功");
          await refreshAll();
        } catch (error) {
          showStatus(error.message, "error");
        }
      });

      $("logoutBtn").addEventListener("click", async () => {
        try {
          await api("/logout", { method: "POST" });
        } finally {
          state.session = null;
          state.apps = [];
          state.desktop = null;
          state.upload = null;
          inspectionBox.textContent = "等待上传 CPK…";
          setAuthedUi(false);
        }
      });

      $("refreshBtn").addEventListener("click", async () => {
        try {
          await refreshAll();
          showStatus("已刷新应用状态");
        } catch (error) {
          showStatus(error.message, "error");
        }
      });

      $("reloadDesktopBtn").addEventListener("click", refreshDesktopFrame);

      appsList.addEventListener("click", async (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        const { action, app } = button.dataset;
        try {
          if (action === "remove-port") {
            if (!window.confirm(`移除 ${app} 的 ${button.dataset.proto} ${button.dataset.listen}->${button.dataset.target} 映射？`)) {
              return;
            }
            await api(`/apps/${encodeURIComponent(app)}/ports`, {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
              body: new URLSearchParams({
                action: "remove",
                listen: button.dataset.listen,
                target: button.dataset.target,
                proto: button.dataset.proto,
              }),
            });
            showStatus(`已移除 ${app} 的端口映射`);
            await refreshAll();
            return;
          }

          if (action === "portmap") {
            const spec = window.prompt("输入端口映射，格式为 宿主端口:容器端口 或 宿主端口:容器端口/udp", "8080:80");
            if (!spec) {
              return;
            }
            const matched = spec.match(/^(\d+):(\d+)(?:\/(tcp|udp))?$/i);
            if (!matched) {
              showStatus("格式不正确，应为 8080:80 或 5353:53/udp", "error");
              return;
            }
            await api(`/apps/${encodeURIComponent(app)}/ports`, {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
              body: new URLSearchParams({
                listen: matched[1],
                target: matched[2],
                proto: matched[3] || "tcp",
              }),
            });
            showStatus(`已更新 ${app} 的端口映射`);
            await refreshAll();
            return;
          }

          if (action === "desktop") {
            await api("/desktop", {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
              body: new URLSearchParams({ app }),
            });
            showStatus(`已将 ${app} 设为桌面应用`);
            await loadDesktop();
            await loadApps();
            return;
          }

          if (action === "uninstall" && !window.confirm(`确定要卸载 ${app} 吗？`)) {
            return;
          }

          await api(`/apps/${encodeURIComponent(app)}/${action}`, { method: "POST" });
          showStatus(`操作成功：${action} ${app}`);
          await refreshAll();
        } catch (error) {
          showStatus(error.message, "error");
        }
      });

      $("uploadBtn").addEventListener("click", async () => {
        const file = $("cpkFile").files[0];
        if (!file) {
          showStatus("请先选择一个 CPK 文件", "error");
          return;
        }
        try {
          const data = await api(`/upload?filename=${encodeURIComponent(file.name)}`, {
            method: "POST",
            headers: { "Content-Type": "application/octet-stream" },
            body: await file.arrayBuffer(),
          });
          state.upload = data.upload;
          $("installBtn").disabled = false;
          inspectionBox.textContent = JSON.stringify(data.inspection, null, 2);
          showStatus("上传完成，预检通过");
        } catch (error) {
          state.upload = null;
          $("installBtn").disabled = true;
          inspectionBox.textContent = error.message;
          showStatus(error.message, "error");
        }
      });

      $("installBtn").addEventListener("click", async () => {
        if (!state.upload) {
          showStatus("还没有可安装的上传结果", "error");
          return;
        }
        try {
          await api("/install", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: new URLSearchParams({ upload_id: state.upload.id }),
          });
          inspectionBox.textContent = "安装成功，可以在左侧应用库中查看。";
          $("installBtn").disabled = true;
          $("cpkFile").value = "";
          state.upload = null;
          showStatus("应用已安装");
          await refreshAll();
        } catch (error) {
          showStatus(error.message, "error");
        }
      });

      refreshAll().catch((error) => {
        setAuthedUi(false);
        showStatus(error.message, "error");
      });
    </script>
  </body>
</html>
